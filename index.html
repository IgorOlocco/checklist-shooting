<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Shooting — Igor Olocco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --terracotta: #c85a3f;
    --terracotta-light: #fff5f2;
    --nero: #1a1a1a;
    --grigio: #7a7a7a;
    --grigio-light: #e0e0e0;
    --off-white: #f4f4f4;
    --bianco: #ffffff;
    --green: #2d6a4f;
    --green-bg: #d8f3dc;
    --blue: #1e40af;
    --blue-bg: #dbeafe;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--off-white);
    color: var(--nero);
    min-height: 100vh;
    line-height: 1.5;
  }

  .header {
    background: var(--nero);
    padding: 16px 16px 12px;
    border-bottom: 3px solid var(--terracotta);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--off-white);
    letter-spacing: 0.5px;
  }

  .btn-reset {
    background: none;
    border: 1px solid #444;
    color: var(--grigio);
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 6px 9px;
    cursor: pointer;
  }

  .tabs {
    display: flex;
    gap: 5px;
  }

  .tab {
    flex: 1;
    background: none;
    border: 1px solid #444;
    color: var(--grigio);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
    padding: 9px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: white;
  }

  .subtitle-bar {
    background: var(--terracotta-light);
    padding: 10px 16px;
    font-size: 11.5px;
    color: var(--nero);
    border-bottom: 1px solid var(--grigio-light);
    line-height: 1.5;
  }

  .subtitle-bar strong { color: var(--terracotta); }

  .progress-wrap {
    padding: 14px 16px 0;
    background: var(--off-white);
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .progress-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--terracotta);
  }

  .progress-label {
    font-size: 10px;
    color: var(--grigio);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .progress-track {
    height: 6px;
    background: var(--grigio-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--terracotta);
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .main {
    padding: 16px 16px 80px;
    max-width: 720px;
    margin: 0 auto;
  }

  .phase, .category { margin-bottom: 22px; }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--nero);
  }

  .phase-icon {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--bianco);
    background: var(--nero);
    width: 25px;
    height: 25px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .phase-titles { flex: 1; }

  .phase-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--nero);
    line-height: 1.2;
  }

  .phase-time {
    font-size: 10px;
    color: var(--terracotta);
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .phase-count, .category-count {
    font-size: 10.5px;
    color: var(--grigio);
    font-weight: 600;
    flex-shrink: 0;
  }

  .category-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--nero);
  }

  .category-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--nero);
  }

  .category-target {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--grigio);
    letter-spacing: 0;
  }

  .count-badge {
    font-size: 10px;
    font-weight: 600;
    color: var(--terracotta);
    background: var(--terracotta-light);
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .category.connection {
    background: var(--nero);
    padding: 14px 12px;
    margin-left: -12px;
    margin-right: -12px;
    border-radius: 4px;
  }

  .category.connection .category-header {
    border-bottom-color: #444;
  }

  .category.connection .category-title {
    color: var(--off-white);
  }

  .category.connection .category-target {
    color: var(--grigio);
  }

  .category.connection .category-count {
    color: var(--terracotta);
  }

  .category.connection .item {
    border-bottom-color: #333;
  }

  .category.connection .item-text h3 {
    color: var(--off-white);
  }

  .category.connection .item-text p {
    color: var(--grigio);
  }

  .category.connection .checkbox {
    background: rgba(255,255,255,0.05);
    border-color: #444;
  }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 4px;
    border-bottom: 1px solid var(--grigio-light);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .item:last-child { border-bottom: none; }
  .item.done { opacity: 0.55; }

  .checkbox {
    width: 23px;
    height: 23px;
    border: 2px solid var(--grigio-light);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bianco);
    transition: all 0.15s;
    margin-top: 1px;
  }

  .item.done .checkbox {
    background: var(--terracotta);
    border-color: var(--terracotta);
  }

  .checkbox svg { width: 13px; height: 13px; opacity: 0; }
  .item.done .checkbox svg { opacity: 1; }

  .item-text h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--nero);
    margin-bottom: 2px;
  }

  .item.done .item-text h3 { text-decoration: line-through; }

  .item-text p {
    font-size: 11.5px;
    color: var(--grigio);
    line-height: 1.5;
  }

  .shot-badges {
    display: flex;
    gap: 4px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .shot-badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    background: var(--blue-bg);
    color: var(--blue);
  }

  .shot-badge.movimento {
    background: var(--terracotta-light);
    color: var(--terracotta);
  }

  .complete-banner {
    display: none;
    background: var(--green-bg);
    border-left: 3px solid var(--green);
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 12.5px;
    color: var(--green);
    font-weight: 600;
  }

  .complete-banner.show { display: block; }

  /* ── CAROSELLO BOX (solo storytelling) ── */
  .carosello-box {
    display: none;
    background: var(--nero);
    padding: 18px 16px;
    margin-top: 8px;
    margin-bottom: 24px;
  }

  .carosello-box.show { display: block; }

  .carosello-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .carosello-icon {
    font-size: 18px;
  }

  .carosello-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--off-white);
  }

  .carosello-desc {
    font-size: 12px;
    color: var(--grigio);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .carosello-counter {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.06);
    padding: 12px 14px;
  }

  .carosello-counter-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--terracotta);
  }

  .carosello-counter-label {
    font-size: 10px;
    color: var(--grigio);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .carosello-btns {
    display: flex;
    gap: 8px;
  }

  .carosello-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid #444;
    background: none;
    color: var(--off-white);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .carosello-btn:active { background: var(--terracotta); border-color: var(--terracotta); }

  @media (min-width: 640px) {
    .header-top { margin-bottom: 16px; }
    .logo { font-size: 21px; }
    .main { padding: 22px 24px 80px; }
    .category-title, .phase-title { font-size: 20px; }
    .item-text h3 { font-size: 15px; }
    .tab { font-size: 12.5px; padding: 10px 8px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Checklist Shooting</div>
    <button class="btn-reset" id="btnReset">Reset</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="foto">📷 Foto</button>
    <button class="tab" data-tab="video">🎬 Video</button>
    <button class="tab" data-tab="storytelling">📖 Storytelling</button>
  </div>
</div>

<div class="subtitle-bar" id="subtitleBar"></div>

<div class="progress-wrap">
  <div class="progress-info">
    <div><span class="progress-count" id="progressCount">0/0</span></div>
    <div class="progress-label" id="progressLabel">Completati</div>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="main">
  <div class="complete-banner" id="completeBanner">✓ Copertura completa raggiunta</div>
  <div id="checklistContainer"></div>
</div>

<script>
const STORAGE_KEY = 'igor_checklist_shooting_v3';

const SUBTITLES = {
  foto: 'Copertura per <strong>soggetto</strong> — piatti, location, staff. Mezza giornata, 4-5 ore. Target: <strong>30 scatti</strong> consegnati.',
  video: 'Riprese per <strong>video completo</strong> — mezza giornata, 4-5 ore. Tutto girato in slow-motion. Badge blu = camera ferma, badge terracotta = gimbal in movimento.',
  storytelling: 'Sequenza fotografica <strong>mattina → sera</strong> — giornata intera, 8 ore. Target: <strong>50 scatti</strong> consegnati (storytelling + piatti).'
};

const DATA = {
  foto: [
    {
      cat: "Staff",
      target: 6,
      items: [
        { id: "f1", title: "Ritratto tutto il team", desc: "Foto di gruppo, momento corale", count: 1 },
        { id: "f2", title: "Ritratto chef / titolare / volto del locale", desc: "Il volto rappresentativo del brand", count: 1 },
        { id: "f3", title: "Cucina al lavoro", desc: "Wide e close-up dell'azione in cucina", count: 2 },
        { id: "f4", title: "Sala al lavoro", desc: "Wide e close-up del servizio in sala", count: 2 },
      ]
    },
    {
      cat: "Location",
      target: 5,
      items: [
        { id: "f5", title: "Esterno — wide", desc: "Facciata e ingresso", count: 1 },
        { id: "f6", title: "Insegna / dettaglio", desc: "Elemento identificativo del locale", count: 1 },
        { id: "f7", title: "Interno (sala / cucina a vista / banco)", desc: "Wide e close dell'ambiente interno", count: 2 },
        { id: "f8", title: "Architettura (lampadario / decorazioni)", desc: "Dettaglio distintivo di design", count: 1 },
      ]
    },
    {
      cat: "Piatti",
      target: 19,
      items: [
        { id: "f9", title: "Piatto signature — autoriale e macro", desc: "Massima cura compositiva, scatto hero", count: 2 },
        { id: "f10", title: "Scatti dinamici", desc: "Mano che serve, cliente che mangia — tavolo e ambiente nel frame", count: 3 },
        { id: "f11", title: "7 piatti — 2 POV ciascuno", desc: "Zenitale e 45° per ogni piatto, copertura ampia del menu", count: 14 },
      ]
    }
  ],

  video: [
    {
      cat: "Piatti",
      items: [
        { id: "v1", title: "Piatto signature", desc: "Massima priorità: copri tutte le inquadrature possibili, tutto in slow-motion", shots: ["Wide fermo", "Macro fermo", "Gimbal"] },
        { id: "v2", title: "Impiattamento in corso", desc: "Mani che completano il piatto — fermo, lo slow-motion valorizza il gesto", shots: ["Macro fermo"] },
        { id: "v3", title: "Altri piatti del menu", desc: "2-3 piatti aggiuntivi, copertura essenziale", shots: ["Wide fermo", "Macro fermo"] },
        { id: "v4", title: "Drink / cocktail in preparazione", desc: "Versamento, shaker, dettaglio bicchiere — il rallenty qui è particolarmente efficace", shots: ["Macro fermo", "Gimbal"] },
        { id: "v5", title: "Steam / texture / fumo", desc: "Dettaglio che comunica freschezza — fermo, lascia parlare il movimento del fumo", shots: ["Macro fermo"] },
      ]
    },
    {
      cat: "Location & Ambiente",
      items: [
        { id: "v6", title: "Esterno / facciata", desc: "Apertura del racconto — il gimbal in slow-motion stabilisce subito il tono", shots: ["Gimbal", "Wide fermo"] },
        { id: "v7", title: "Sala vuota", desc: "Ampio respiro, atmosfera generale", shots: ["Wide fermo", "Gimbal"] },
        { id: "v8", title: "Dettagli arredo/design", desc: "Elementi distintivi ravvicinati, composizione curata", shots: ["Medio fermo", "Macro fermo"] },
        { id: "v9", title: "Bancone / cucina a vista", desc: "Punto di forza visivo se presente", shots: ["Wide fermo", "Gimbal"] },
        { id: "v10", title: "Luce naturale / golden hour", desc: "Momento evocativo, massima resa dello slow-motion qui", shots: ["Gimbal", "Wide fermo"] },
      ]
    },
    {
      cat: "Persone & Staff",
      items: [
        { id: "v11", title: "Chef in cucina", desc: "Azione reale, massima priorità per il racconto", shots: ["Medio fermo", "Macro fermo", "Gimbal"] },
        { id: "v12", title: "Staff di sala in movimento", desc: "Naturale, non in posa — il gimbal segue il movimento reale", shots: ["Gimbal"] },
        { id: "v13", title: "Titolare / volto del locale", desc: "Rafforza la storia, anche solo un breve momento", shots: ["Medio fermo"] },
      ]
    },
    {
      cat: "Transizioni & Respiro",
      items: [
        { id: "v14", title: "Transizione esterno → interno", desc: "Passaggio che collega le sezioni, dà fluidità al montaggio", shots: ["Gimbal"] },
        { id: "v15", title: "Dettaglio neutro (riempitivo)", desc: "Un'inquadratura pulita senza soggetto forte, utile per stacchi e ritmo in fase di montaggio", shots: ["Wide fermo"] },
        { id: "v16", title: "Chiusura ampia", desc: "Vista d'insieme finale, per chiudere il racconto con respiro", shots: ["Gimbal", "Wide fermo"] },
      ]
    }
  ],

  storytelling: [
    {
      cat: "Staff",
      target: 10,
      items: [
        { id: "t1", title: "Ritratto tutto il team", desc: "Foto di gruppo, momento corale", count: 1 },
        { id: "t2", title: "Ritratto chef / titolare / volto del locale", desc: "Il volto rappresentativo del brand", count: 1 },
        { id: "t3", title: "Cucina al lavoro", desc: "Wide e close-up dell'azione in cucina", count: 2 },
        { id: "t4", title: "Sala al lavoro", desc: "Wide e close-up del servizio in sala", count: 2 },
        { id: "t5", title: "Sala al lavoro — alternative", desc: "Wide e close, momenti diversi da quelli base", count: 2 },
        { id: "t6", title: "Cucina al lavoro — alternative", desc: "Wide e close, momenti diversi da quelli base", count: 2 },
      ]
    },
    {
      cat: "Location",
      target: 9,
      items: [
        { id: "t7", title: "Esterno giorno e sera — wide", desc: "Facciata e ingresso, in entrambi i momenti — arco temporale percepibile", count: 2 },
        { id: "t8", title: "Insegna / dettaglio giorno e sera", desc: "Elemento identificativo del locale, in entrambi i momenti", count: 2 },
        { id: "t9", title: "Interno (sala / cucina a vista / banco)", desc: "Wide e close dell'ambiente interno", count: 2 },
        { id: "t10", title: "Architettura (lampadario / decorazioni)", desc: "Dettaglio distintivo di design", count: 1 },
        { id: "t13", title: "Texture ambiente", desc: "Materiali, superfici, dettaglio tattile dell'ambiente", count: 1 },
      ]
    },
    {
      cat: "Piatti",
      target: 28,
      items: [
        { id: "t14", title: "3 piatti importanti — autoriale e macro", desc: "Piatto signature più altri 2 piatti di rilievo, stesso trattamento curato", count: 6 },
        { id: "t15", title: "Scatti dinamici", desc: "Mano che serve, cliente che mangia — tavolo e ambiente nel frame", count: 3 },
        { id: "t16", title: "7 piatti — 2 POV ciascuno", desc: "Zenitale e 45° per ogni piatto, copertura ampia del menu", count: 14 },
        { id: "t19", title: "Materie prime", desc: "Wide, close e texture degli ingredienti", count: 3 },
        { id: "t20", title: "2 vini — autoriale/dinamico", desc: "Bottiglie o calici, scatto curato", count: 2 },
      ]
    },
    {
      cat: "Transizioni & Contesto",
      target: 4,
      items: [
        { id: "t21", title: "Mosso — servizio in sala", desc: "Piatto in mano, movimento reale, dà dinamismo al racconto", count: 1 },
        { id: "t22", title: "Tavolo vissuto post servizio", desc: "L'esperienza già accaduta, atmosfera autentica", count: 1 },
        { id: "t23", title: "Pila di piatti in plonge", desc: "Il dietro le quinte, autenticità del lavoro reale", count: 1 },
        { id: "t24", title: "Momento svago / convivialità team", desc: "Staff che si rilassa o scherza, tocco umano e autentico", count: 1 },
      ]
    }
  ]
};

let currentTab = 'foto';
let state = {};
let caroselloCount = 0;

function load() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    const parsed = s ? JSON.parse(s) : {};
    state = parsed.state || {};
    caroselloCount = parsed.caroselloCount || 0;
  } catch(e) { state = {}; caroselloCount = 0; }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ state, caroselloCount })); } catch(e) {}
}

function toggleItem(id) {
  state[id] = !state[id];
  save();
  render();
}

function changeCarosello(delta) {
  caroselloCount = Math.max(0, Math.min(10, caroselloCount + delta));
  save();
  renderCarosello();
}

function resetAll() {
  if (!confirm('Azzerare tutte le spunte di questo shooting?')) return;
  state = {};
  caroselloCount = 0;
  save();
  render();
}

function renderCarosello() {
  const box = document.getElementById('caroselloBox');
  if (!box) return;
  box.querySelector('.carosello-counter-num').textContent = caroselloCount + ' / 10';
}

function render() {
  const container = document.getElementById('checklistContainer');
  const groups = DATA[currentTab];
  const isStorytelling = currentTab === 'storytelling';

  document.getElementById('subtitleBar').innerHTML = SUBTITLES[currentTab];

  let totalItems = 0;
  let doneItems = 0;

  let html = groups.map(group => {
    const groupDone = group.items.filter(it => state[it.id]).length;
    const groupShotTotal = group.items.reduce((sum, it) => sum + (it.count || 1), 0);
    totalItems += group.items.length;
    doneItems += groupDone;

    const itemsHtml = group.items.map(it => {
      const badges = it.shots ? `<div class="shot-badges">${it.shots.map(s => {
        const isMovimento = s.toLowerCase().includes('gimbal');
        return `<span class="shot-badge ${isMovimento ? 'movimento' : ''}">${s}</span>`;
      }).join('')}</div>` : '';
      const countBadge = it.count ? `<span class="count-badge">${it.count} foto</span>` : '';
      return `
        <div class="item ${state[it.id] ? 'done' : ''}" onclick="toggleItem('${it.id}')">
          <div class="checkbox">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 13l4 4L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="item-text">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
              <h3>${it.title}</h3>
              ${countBadge}
            </div>
            <p>${it.desc}</p>
            ${badges}
          </div>
        </div>
      `;
    }).join('');

    const connectionClass = group.isConnection ? 'connection' : '';
    return `
      <div class="category ${connectionClass}">
        <div class="category-header">
          <div class="category-title">${group.cat} <span class="category-target">— ${group.target || groupShotTotal} foto target</span></div>
          <div class="category-count">${groupDone}/${group.items.length}</div>
        </div>
        ${itemsHtml}
      </div>
    `;
  }).join('');

  if (isStorytelling) {
    html += `
      <div class="carosello-box show" id="caroselloBox">
        <div class="carosello-header">
          <span class="carosello-icon">🎞️</span>
          <span class="carosello-title">Selezione Carosello</span>
        </div>
        <div class="carosello-desc">Al termine dello shooting, seleziona le 10 foto migliori da consegnare come carosello pronto da pubblicare — un output rapido oltre al materiale completo.</div>
        <div class="carosello-counter">
          <div>
            <div class="carosello-counter-num">${caroselloCount} / 10</div>
            <div class="carosello-counter-label">Foto selezionate</div>
          </div>
          <div class="carosello-btns">
            <button class="carosello-btn" onclick="changeCarosello(-1)">−</button>
            <button class="carosello-btn" onclick="changeCarosello(1)">+</button>
          </div>
        </div>
      </div>
    `;
  }

  container.innerHTML = html;

  document.getElementById('progressCount').textContent = `${doneItems}/${totalItems}`;
  const pct = totalItems ? Math.round((doneItems / totalItems) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';

  const banner = document.getElementById('completeBanner');
  banner.classList.toggle('show', totalItems > 0 && doneItems === totalItems);
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    render();
  });
});

document.getElementById('btnReset').addEventListener('click', resetAll);

load();
render();
</script>

</body>
</html>
